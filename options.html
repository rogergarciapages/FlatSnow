<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options - SNOW Quick Ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
    <style>
        body {
            width: 100%;
            height: 100vh;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #f1f5f9;
        }

        .options-container {
            width: 600px;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .options-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .options-header p {
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .config-section {
            padding: 24px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .config-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--bg-color);
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .auth-toggle {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .auth-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }

        .auth-option.active {
            border-color: var(--accent-color);
            background: rgba(3, 141, 141, 0.05);
            color: var(--accent-color);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="options-container">
        <header class="options-header">
            <h1>SNOW Quick Ticket Config</h1>
            <p>Set up your ServiceNow instance connection and credentials.</p>
        </header>

        <form id="config-form">
            <section class="config-section">
                <h2>Instance Details</h2>
                <div class="form-group">
                    <label for="instanceUrl">ServiceNow Instance URL</label>
                    <input type="url" id="instanceUrl" name="instanceUrl" placeholder="https://dev12345.service-now.com"
                        required>
                    <p class="help-text">Full URL including https://</p>
                </div>
            </section>

            <section class="config-section">
                <h2>Authentication</h2>
                <div class="auth-toggle">
                    <div class="auth-option active" data-type="bearer">Bearer Token</div>
                    <div class="auth-option" data-type="basic">Basic Auth</div>
                    <input type="hidden" id="authType" name="authType" value="bearer">
                </div>

                <div id="auth-bearer-group">
                    <div class="form-group">
                        <label for="token">API Token (Access Token)</label>
                        <input type="password" id="token" name="token" placeholder="Your SNOW access token">
                    </div>
                </div>

                <div id="auth-basic-group" class="hidden">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Service Account Username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Service Account Password">
                    </div>
                </div>
            </section>

            <button type="submit" class="btn-save">Save Configuration</button>
        </form>

        <div id="status-msg" style="margin-top: 16px; text-align: center; display: none;"></div>
    </div>

    <script src="storage.js"></script>
    <script src="options.js"></script>
</body>

</html>
